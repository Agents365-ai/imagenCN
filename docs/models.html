<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>ImagenCN — Model Reference</title>
<style>
  :root {
    --bg: #fafafa;
    --card-bg: #fff;
    --text: #1a1a1a;
    --text-secondary: #666;
    --border: #e5e5e5;
    --badge-bg: #f0f0f0;
    --tag-bg: #eef2ff;
    --tag-text: #4338ca;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111;
      --card-bg: #1a1a1a;
      --text: #eee;
      --text-secondary: #999;
      --border: #333;
      --badge-bg: #222;
      --tag-bg: #1e1b4b;
      --tag-text: #a5b4fc;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 2rem 1rem;
  }
  .container { max-width: 1200px; margin: 0 auto; }
  h1 { font-size: 2rem; margin-bottom: .25rem; }
  .subtitle { color: var(--text-secondary); margin-bottom: 2rem; }
  h2 { font-size: 1.35rem; margin: 2.5rem 0 1rem; padding-bottom: .5rem; border-bottom: 2px solid var(--border); }
  h3 { font-size: 1.05rem; margin-bottom: .75rem; }

  /* Provider cards */
  .provider-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 1.25rem; }
  .provider-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .provider-header {
    padding: 1rem 1.25rem;
    display: flex; align-items: center; gap: .75rem;
    border-bottom: 1px solid var(--border);
  }
  .provider-color { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
  .provider-name { font-weight: 700; font-size: 1.05rem; }
  .provider-cn { color: var(--text-secondary); font-size: .85rem; margin-left: auto; }
  .provider-body { padding: 0; }
  .model-row {
    display: grid;
    grid-template-columns: 1fr auto auto;
    align-items: center;
    gap: .5rem;
    padding: .6rem 1.25rem;
    border-bottom: 1px solid var(--border);
    font-size: .88rem;
  }
  .model-row:last-child { border-bottom: none; }
  .model-row.default { background: color-mix(in srgb, var(--badge-bg) 60%, transparent); }
  .model-name { font-weight: 600; }
  .model-desc { color: var(--text-secondary); font-size: .78rem; grid-column: 1 / -1; margin-top: -.2rem; }
  .model-price { font-weight: 600; font-size: .82rem; white-space: nowrap; }
  .model-res { color: var(--text-secondary); font-size: .78rem; white-space: nowrap; text-align: right; }
  .badge {
    display: inline-block;
    font-size: .68rem;
    padding: 1px 6px;
    border-radius: 3px;
    background: var(--badge-bg);
    color: var(--text-secondary);
  }
  .badge-default { background: #e0f2fe; color: #0369a1; }
  .badge-edit { background: #fef3c7; color: #92400e; }
  @media (prefers-color-scheme: dark) {
    .badge-default { background: #0c4a6e; color: #7dd3fc; }
    .badge-edit { background: #451a03; color: #fcd34d; }
  }

  /* Quick reference table */
  .quick-table { width: 100%; border-collapse: collapse; font-size: .9rem; }
  .quick-table th, .quick-table td { padding: .55rem .85rem; text-align: left; border-bottom: 1px solid var(--border); }
  .quick-table th { font-weight: 600; color: var(--text-secondary); font-size: .78rem; text-transform: uppercase; letter-spacing: .05em; }
  .quick-table .platform-tag {
    display: inline-block; padding: 1px 8px; border-radius: 3px; font-size: .72rem; font-weight: 600;
  }

  /* Stats row */
  .stats { display: flex; gap: 1.5rem; flex-wrap: wrap; margin-bottom: 2rem; }
  .stat { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: .85rem 1.25rem; }
  .stat-value { font-size: 1.5rem; font-weight: 700; }
  .stat-label { font-size: .78rem; color: var(--text-secondary); }

  .updated { color: var(--text-secondary); font-size: .78rem; text-align: right; margin-top: 3rem; }
  a { color: #2563eb; }
  @media (prefers-color-scheme: dark) { a { color: #60a5fa; } }
</style>
</head>
