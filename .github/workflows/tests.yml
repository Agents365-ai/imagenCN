name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # Tests mock all network calls; providers/base.py needs requests at
      # import time and generate_image.py requires dashscope at startup.
      # Verified against a clean venv.
      - run: pip install pytest requests dashscope
      - run: pytest -q
